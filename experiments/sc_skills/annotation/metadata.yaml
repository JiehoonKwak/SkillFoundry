{
  "default_methods": [
    "dataset exploration",
    "cellxgene reference selection",
    "harmony-surrogate label transfer"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "annotation_table.tsv",
      "required_columns": [
        "cell_id",
        "sample_id",
        "x_coord",
        "y_coord",
        "predicted_label",
        "label_source",
        "label_confidence",
        "broad_label",
        "marker_status",
        "notes"
      ]
    },
    {
      "kind": "md",
      "path": "marker_evidence.md",
      "required_sections": [
        "Run context",
        "Reference source",
        "Marker review",
        "Conflicts and resolutions",
        "Remaining uncertainty"
      ]
    }
  ],
  "experiment_only": true,
  "family": "spatial_foundation",
  "focus_terms": [
    "spatial",
    "annotation",
    "single-cell",
    "cellxgene",
    "harmony",
    "cell type"
  ],
  "helper_scripts": [
    {
      "path": "scripts/check_runtime.py",
      "role": "Inspect package availability, versions, bootstrap commands, and documented fallback paths."
    },
    {
      "path": "scripts/plan_census_env.py",
      "role": "Recommend the supported CELLxGENE/Census execution route for the current host, including Python-version-aware environment creation commands."
    },
    {
      "path": "scripts/rank_reference_metadata.py",
      "role": "Rank exported CELLxGENE/Census metadata offline and record why candidates are kept or rejected."
    },
    {
      "path": "scripts/run_annotation.py",
      "role": "Execute the deterministic surrogate workflow used for offline validation and fallback method-shape checks."
    }
  ],
  "real_run_artifacts": [
    "00_runtime_check.json",
    "00b_census_env_plan.json",
    "01_dataset_profile.json",
    "02_census_datasets.tsv",
    "03_reference_metadata.tsv",
    "04_reference_ranked.tsv",
    "05_reference_selection.json",
    "06_query_preprocess.h5ad",
    "07_reference_preprocess.h5ad",
    "08_label_transfer_qc.tsv"
  ],
  "source_reference": "ref/skill/annotation.md",
  "starter_qc_files": [
    "qc_dataset_exploration.json",
    "qc_reference_search.tsv",
    "qc_reference_selection.json",
    "qc_label_transfer.tsv",
    "run_summary.json"
  ],
  "target_dir": "experiments/sc_skills/annotation",
  "task_slug": "annotation",
  "title": "Spatial Cell Type Annotation via Reference Transfer"
}
