{
  "default_methods": [
    "CellPhoneDB statistical mode",
    "DEG mode",
    "interaction ranking"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "cellphonedb_significant_means.tsv",
      "required_columns": [
        "interacting_pair",
        "source_group",
        "target_group",
        "mean_expression",
        "pvalue"
      ]
    },
    {
      "kind": "tsv",
      "path": "interaction_ranked.tsv",
      "required_columns": [
        "rank",
        "interacting_pair",
        "evidence",
        "supporting_group_pair"
      ]
    },
    {
      "kind": "md",
      "path": "cellphonedb_report.md",
      "required_sections": [
        "Run context",
        "Significant interactions",
        "Ranking logic",
        "Caveats"
      ]
    }
  ],
  "experiment_only": true,
  "family": "communication",
  "focus_terms": [
    "cellphonedb",
    "ligand receptor",
    "single-cell"
  ],
  "qc_artifacts": [
    {
      "kind": "tsv",
      "path": "qc_group_expression.tsv",
      "required_columns": [
        "group",
        "gene",
        "cell_count",
        "mean_expression",
        "expression_fraction"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_statistical_null.tsv",
      "required_columns": [
        "interacting_pair",
        "source_group",
        "target_group",
        "observed_mean_expression",
        "null_mean_expression",
        "null_max_expression",
        "empirical_pvalue"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_deg_support.tsv",
      "required_columns": [
        "interacting_pair",
        "source_group",
        "target_group",
        "ligand_is_deg",
        "receptor_is_deg",
        "deg_relevant"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_adjacency_support.tsv",
      "required_columns": [
        "interacting_pair",
        "source_group",
        "target_group",
        "supporting_edges",
        "group_edges",
        "adjacency_fraction",
        "spatial_support"
      ]
    },
    {
      "kind": "json",
      "path": "run_summary.json",
      "required_keys": [
        "run_label",
        "counts",
        "top_interaction",
        "written_files"
      ]
    }
  ],
  "source_reference": "experiments/sc_skills/cellphonedb-analysis/source_reference.md",
  "starter_scope": {
    "computed": [
      "group-level means and expression fractions from the raw toy cell matrix",
      "CellPhoneDB-like mean-expression testing across directed group pairs",
      "a tiny deterministic label-shuffle null for empirical p-values",
      "DEG relevance flags and optional adjacency support for ranked interactions"
    ],
    "approximated": [
      "the statistical mode uses a tiny fixed-number shuffle null instead of CellPhoneDB's larger production permutation runs",
      "DEG mode is reduced to a simple user-supplied group-gene relevance table",
      "interaction ranking combines min-expression, geometric mean, DEG support, and adjacency heuristics rather than the full CellPhoneDB v5 scoring stack"
    ],
    "surrogate": [
      "the ligand-receptor catalog, DEG calls, and adjacency graph are synthetic starter inputs and not a substitute for a real curated atlas-backed analysis"
    ]
  },
  "target_dir": "experiments/sc_skills/cellphonedb-analysis",
  "task_slug": "cellphonedb-analysis",
  "title": "CellPhoneDB Ligand-Receptor Analysis"
}
