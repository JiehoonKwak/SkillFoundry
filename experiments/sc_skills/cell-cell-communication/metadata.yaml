{
  "default_methods": [
    "LIANA aggregation",
    "CellPhoneDB statistics",
    "spatial cross-check"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "communication_results.tsv",
      "required_columns": [
        "source_group",
        "target_group",
        "ligand",
        "receptor",
        "score",
        "method",
        "spatial_support"
      ]
    },
    {
      "kind": "tsv",
      "path": "priority_pairs.tsv",
      "required_columns": [
        "rank",
        "ligand",
        "receptor",
        "source_group",
        "target_group",
        "priority_reason"
      ]
    },
    {
      "kind": "md",
      "path": "interpretation_report.md",
      "required_sections": [
        "Run context",
        "Methods",
        "Prioritized interactions",
        "Spatial support",
        "Caveats"
      ]
    }
  ],
  "experiment_only": true,
  "family": "communication",
  "focus_terms": [
    "cell-cell communication",
    "ligand receptor",
    "spatial"
  ],
  "qc_artifacts": [
    {
      "kind": "tsv",
      "path": "qc_group_expression.tsv",
      "required_columns": [
        "group",
        "gene",
        "cell_count",
        "mean_expression",
        "expression_fraction"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_pair_nulls.tsv",
      "required_columns": [
        "source_group",
        "target_group",
        "ligand",
        "receptor",
        "observed_mean_stat",
        "null_mean_stat",
        "null_max_stat",
        "empirical_pvalue"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_spatial_support.tsv",
      "required_columns": [
        "source_group",
        "target_group",
        "ligand",
        "receptor",
        "supporting_edges",
        "group_edges",
        "adjacency_fraction",
        "spatial_support"
      ]
    },
    {
      "kind": "json",
      "path": "run_summary.json",
      "required_keys": [
        "run_label",
        "counts",
        "top_pair",
        "written_files"
      ]
    }
  ],
  "source_reference": "experiments/sc_skills/cell-cell-communication/source_reference.md",
  "starter_scope": {
    "computed": [
      "group-level means and expression fractions from the raw toy cell matrix",
      "LIANA-like rank aggregation from min and geometric-mean scores",
      "CellPhoneDB-like label-shuffle null statistics on tiny synthetic data",
      "adjacency-based spatial support fractions over the provided toy graph"
    ],
    "approximated": [
      "LIANA consensus is reduced to two deterministic rank components instead of the full method stack",
      "CellPhoneDB statistics use a tiny fixed-number shuffle null without external databases or FDR correction"
    ],
    "surrogate": [
      "the toy ligand-receptor catalog and spatial graph are synthetic and only validate the shell-friendly starter contract"
    ]
  },
  "target_dir": "experiments/sc_skills/cell-cell-communication",
  "task_slug": "cell-cell-communication",
  "title": "Cell-Cell Communication Analysis"
}
