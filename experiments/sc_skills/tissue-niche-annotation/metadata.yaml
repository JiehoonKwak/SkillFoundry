{
  "default_methods": [
    "spatial neighbor graph",
    "neighborhood composition profiling",
    "niche annotation"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "niche_labels.tsv",
      "required_columns": [
        "cell_id",
        "sample_id",
        "cell_type",
        "niche_label",
        "niche_confidence",
        "dominant_neighbor_type",
        "boundary_score",
        "notes"
      ]
    },
    {
      "kind": "tsv",
      "path": "niche_markers.tsv",
      "required_columns": [
        "niche_label",
        "dominant_cell_types",
        "marker_context",
        "support_score"
      ]
    },
    {
      "kind": "md",
      "path": "tissue_niche_report.md",
      "required_sections": [
        "Run context",
        "Spatial graph",
        "Niche definitions",
        "Caveats"
      ]
    }
  ],
  "experiment_only": true,
  "family": "spatial_structure",
  "focus_terms": [
    "tissue niches",
    "single-cell spatial",
    "CellCharter",
    "Squidpy",
    "UTAG"
  ],
  "helper_scripts": [
    {
      "path": "scripts/check_runtime.py",
      "role": "Inspect package availability, versions, bootstrap commands, and fallback paths for Squidpy, CellCharter, and UTAG."
    },
    {
      "path": "scripts/plan_niche_run.py",
      "role": "Scaffold graph parameters, expected outputs, and stop conditions before a real niche run."
    },
    {
      "path": "scripts/run_tissue_niche_annotation.py",
      "role": "Execute the deterministic surrogate workflow used for offline validation and fallback method-shape checks."
    }
  ],
  "starter_qc_files": [
    "qc_spatial_graph.tsv",
    "qc_neighborhood_profiles.tsv",
    "qc_niche_scores.tsv",
    "run_summary.json"
  ],
  "source_reference": "ref/skill/tissue_niche_annotation.md",
  "target_dir": "experiments/sc_skills/tissue-niche-annotation",
  "task_slug": "tissue-niche-annotation",
  "title": "Tissue Niche Annotation"
}
