{
  "default_methods": [
    "Tangram mapping",
    "gene intersection QC",
    "label transfer review"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "mapped_labels.tsv",
      "required_columns": [
        "observation_id",
        "x_coord",
        "y_coord",
        "primary_label",
        "primary_score",
        "score_margin",
        "secondary_label",
        "mapping_method",
        "gene_overlap_count",
        "gene_overlap_fraction",
        "marker_review_status",
        "review_notes"
      ]
    },
    {
      "kind": "tsv",
      "path": "mapping_scores.tsv",
      "required_columns": [
        "metric_category",
        "metric_name",
        "scope",
        "target_id",
        "method",
        "value",
        "higher_is_better",
        "suggested_pass_floor",
        "qc_status",
        "notes"
      ]
    },
    {
      "kind": "md",
      "path": "spatial_mapping_report.md",
      "required_sections": [
        "Run context",
        "Inputs and preprocessing",
        "Gene intersection QC",
        "Tangram mapping",
        "Label transfer review",
        "Caveats and next actions"
      ]
    }
  ],
  "experiment_only": true,
  "family": "spatial_foundation",
  "focus_terms": [
    "spatial mapping",
    "Tangram",
    "label transfer"
  ],
  "starter_qc_files": [
    "intermediate_qc.json",
    "gene_intersection_qc.tsv",
    "marker_qc.tsv",
    "niche_qc.tsv",
    "run_summary.json"
  ],
  "source_reference": "ref/skill/spatial_mapping.md",
  "target_dir": "experiments/sc_skills/spatial-mapping",
  "task_slug": "spatial-mapping",
  "title": "Spatial Mapping"
}
