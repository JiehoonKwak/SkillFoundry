{
  "default_methods": [
    "LIANA ranking",
    "resource harmonization",
    "condition-aware summaries"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "liana_rankings.tsv",
      "required_columns": [
        "rank",
        "source_group",
        "target_group",
        "ligand",
        "receptor",
        "aggregate_score"
      ]
    },
    {
      "kind": "tsv",
      "path": "resource_overlap.tsv",
      "required_columns": [
        "pair",
        "resource_count",
        "resources"
      ]
    },
    {
      "kind": "md",
      "path": "liana_report.md",
      "required_sections": [
        "Run context",
        "Rankings",
        "Resource overlap",
        "Caveats"
      ]
    }
  ],
  "experiment_only": true,
  "family": "communication",
  "focus_terms": [
    "liana",
    "cell communication",
    "ligand receptor"
  ],
  "qc_artifacts": [
    {
      "kind": "tsv",
      "path": "qc_metadata_harmonization.tsv",
      "required_columns": [
        "cell_id",
        "raw_group",
        "normalized_group",
        "raw_condition",
        "normalized_condition",
        "harmonized"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_group_expression.tsv",
      "required_columns": [
        "group",
        "condition",
        "gene",
        "cell_count",
        "mean_expression",
        "expression_fraction"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_method_scores.tsv",
      "required_columns": [
        "pair",
        "source_group",
        "target_group",
        "expression_pass",
        "min_expr",
        "geometric_mean",
        "specificity",
        "empirical_pvalue",
        "aggregate_rank",
        "aggregate_score"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_condition_summary.tsv",
      "required_columns": [
        "pair",
        "source_group",
        "target_group",
        "baseline_condition",
        "comparison_condition",
        "baseline_geometric_mean",
        "comparison_geometric_mean",
        "delta_geometric_mean",
        "dominant_condition"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_adjacency_support.tsv",
      "required_columns": [
        "pair",
        "source_group",
        "target_group",
        "supporting_edges",
        "possible_edges",
        "adjacency_fraction",
        "spatial_support"
      ]
    },
    {
      "kind": "json",
      "path": "run_summary.json",
      "required_keys": [
        "run_label",
        "selected_methods",
        "counts",
        "top_interaction",
        "written_files"
      ]
    }
  ],
  "source_reference": "experiments/sc_skills/liana-analysis/source_reference.md",
  "starter_scope": {
    "computed": [
      "metadata harmonization for group, condition, and resource labels from raw toy inputs",
      "LIANA-like interaction scoring with min-expression, geometric-mean, specificity, and tiny shuffle-null ranks",
      "resource overlap summaries and condition-aware geometric-mean deltas",
      "optional adjacency support as a separate machine-readable QC layer"
    ],
    "approximated": [
      "rank aggregation is a deterministic mean-rank starter rather than the full LIANA consensus or LIANA+ runtime",
      "the null model uses a bounded label-shuffle procedure on a tiny synthetic dataset instead of production permutation depth",
      "specificity is a lightweight enrichment heuristic and not a drop-in replacement for every LIANA back-end method"
    ],
    "surrogate": [
      "the ligand-receptor catalog, canonical resources, and adjacency graph are synthetic starter inputs and not a substitute for a real OmniPath-backed or atlas-backed analysis"
    ]
  },
  "target_dir": "experiments/sc_skills/liana-analysis",
  "task_slug": "liana-analysis",
  "title": "LIANA Communication Analysis"
}
