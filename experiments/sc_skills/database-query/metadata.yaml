{
  "title": "Bioinformatics Database Query",
  "task_slug": "database-query",
  "family": "bioinformatics_utilities",
  "experiment_only": true,
  "default_methods": [
    "identifier normalization",
    "API fan-out",
    "cross-source reconciliation"
  ],
  "focus_terms": [
    "database lookup",
    "gene identifier normalization",
    "protein accession lookup",
    "variant lookup",
    "disease lookup"
  ],
  "source_reference": "experiments/sc_skills/database-query/source_reference.md",
  "target_dir": "experiments/sc_skills/database-query",
  "deliverables": [
    {
      "kind": "tsv",
      "path": "query_results.tsv",
      "required_columns": [
        "query",
        "normalized_id",
        "source",
        "match_label",
        "evidence"
      ]
    },
    {
      "kind": "md",
      "path": "source_provenance.md",
      "required_sections": [
        "Run context",
        "APIs consulted",
        "Normalization",
        "Caveats"
      ]
    },
    {
      "kind": "md",
      "path": "resolution_notes.md",
      "required_sections": [
        "Resolved identifiers",
        "Ambiguity handling",
        "Follow-up"
      ]
    }
  ],
  "auxiliary_outputs": [
    {
      "kind": "tsv",
      "path": "normalization_qc.tsv",
      "required_columns": [
        "query",
        "normalized_query",
        "inferred_entity_type",
        "candidate_keys",
        "local_alias_hits",
        "gene_type_score",
        "protein_type_score",
        "variant_type_score",
        "disease_type_score"
      ]
    },
    {
      "kind": "tsv",
      "path": "fanout_qc.tsv",
      "required_columns": [
        "query",
        "source",
        "concept_id",
        "entity_type",
        "source_id",
        "matched_key",
        "match_kind",
        "base_score"
      ]
    },
    {
      "kind": "tsv",
      "path": "reconciliation_qc.tsv",
      "required_columns": [
        "query",
        "winning_concept_id",
        "inferred_entity_type",
        "resolved_id",
        "supporting_sources",
        "source_hit_count",
        "winning_score",
        "runner_up_concept_id",
        "score_margin",
        "ambiguity_flag"
      ]
    },
    {
      "kind": "json",
      "path": "run_summary.json",
      "required_keys": [
        "run_label",
        "query_count",
        "resolved_count",
        "ambiguous_query_count",
        "cross_source_supported_query_count",
        "written_files"
      ]
    }
  ],
  "test_commands": [
    "python3 scripts/run_exercise.py --outdir scratch/toy_run",
    "python3 -m unittest tests/test_contract.py tests/test_database_query.py"
  ]
}
