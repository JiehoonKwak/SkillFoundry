{
  "default_methods": [
    "knowledge-base lookup",
    "expression filtering",
    "spatial validation"
  ],
  "deliverables": [
    {
      "kind": "tsv",
      "path": "candidate_pairs.tsv",
      "required_columns": [
        "candidate_pair",
        "source_group",
        "target_group",
        "support_score"
      ]
    },
    {
      "kind": "tsv",
      "path": "evidence_table.tsv",
      "required_columns": [
        "candidate_pair",
        "evidence_type",
        "evidence_value"
      ]
    },
    {
      "kind": "md",
      "path": "discovery_summary.md",
      "required_sections": [
        "Run context",
        "Prioritized candidates",
        "Evidence summary",
        "Caveats"
      ]
    }
  ],
  "experiment_only": true,
  "family": "communication",
  "focus_terms": [
    "ligand receptor discovery",
    "communication",
    "spatial"
  ],
  "qc_artifacts": [
    {
      "kind": "tsv",
      "path": "qc_group_expression.tsv",
      "required_columns": [
        "group",
        "gene",
        "cell_count",
        "mean_expression",
        "expression_fraction"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_pair_scores.tsv",
      "required_columns": [
        "candidate_pair",
        "source_group",
        "target_group",
        "expression_pass",
        "ligand",
        "receptor",
        "ligand_mean",
        "receptor_mean",
        "ligand_fraction",
        "receptor_fraction",
        "min_expr",
        "geometric_mean",
        "expression_score",
        "resource_count",
        "knowledge_score",
        "resources"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_shuffle_null.tsv",
      "required_columns": [
        "candidate_pair",
        "source_group",
        "target_group",
        "observed_expression_score",
        "null_mean_score",
        "null_max_score",
        "null_ge_count",
        "empirical_pvalue"
      ]
    },
    {
      "kind": "tsv",
      "path": "qc_spatial_support.tsv",
      "required_columns": [
        "candidate_pair",
        "source_group",
        "target_group",
        "ligand",
        "receptor",
        "supporting_edges",
        "possible_edges",
        "adjacency_fraction",
        "spatial_support"
      ]
    },
    {
      "kind": "json",
      "path": "run_summary.json",
      "required_keys": [
        "run_label",
        "counts",
        "top_candidate",
        "written_files"
      ]
    }
  ],
  "source_reference": "experiments/sc_skills/ligand-receptor-discovery/source_reference.md",
  "starter_scope": {
    "computed": [
      "group means and expression fractions from the raw toy cell matrix",
      "knowledge-base-informed ligand-receptor scoring with min and geometric-mean expression components",
      "a tiny deterministic label-shuffle null for ranking support",
      "adjacency-based spatial support over the provided toy graph"
    ],
    "approximated": [
      "resource support is a lightweight alias-and-weight lookup over the toy catalog rather than a full OmniPath or CellPhoneDB database query",
      "the null model uses 31 fixed deterministic shuffles instead of production permutation depth or multiple-testing correction",
      "spatial validation is reduced to adjacency support on a tiny synthetic graph rather than a full Squidpy or LIANA+ spatial statistic"
    ],
    "surrogate": [
      "the catalog, expression matrix, and adjacency graph are synthetic starter inputs and not a substitute for a real biological analysis"
    ]
  },
  "target_dir": "experiments/sc_skills/ligand-receptor-discovery",
  "task_slug": "ligand-receptor-discovery",
  "title": "Ligand-Receptor Discovery"
}
